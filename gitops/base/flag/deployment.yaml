apiVersion: apps/v1
kind: Deployment
metadata:
  name: togglemaster-flag
  namespace: togglemaster
  labels:
    app: togglemaster-flag
spec:
  replicas: 2
  selector:
    matchLabels:
      app: togglemaster-flag
  template:
    metadata:
      labels:
        app: togglemaster-flag
    spec:
      containers:
        - name: flag
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/togglemaster-flag:latest
          ports:
            - containerPort: 8002
          env:
            - name: PORT
              value: "8002"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: rds-core-secret
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: rds-core-secret
                  key: port
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: rds-core-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rds-core-secret
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: rds-core-secret
                  key: dbname
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
