apiVersion: apps/v1
kind: Deployment
metadata:
  name: togglemaster-auth
  namespace: togglemaster
  labels:
    app: togglemaster-auth
    version: "1.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: togglemaster-auth
  template:
    metadata:
      labels:
        app: togglemaster-auth
    spec:
      containers:
        - name: auth
          # TAG ATUALIZADA AUTOMATICAMENTE PELO CI
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/togglemaster-auth:latest
          ports:
            - containerPort: 8001
          env:
            - name: PORT
              value: "8001"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: rds-auth-secret
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: rds-auth-secret
                  key: port
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: rds-auth-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rds-auth-secret
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: rds-auth-secret
                  key: dbname
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
