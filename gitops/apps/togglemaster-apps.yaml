# ─────────────────────────────────────────────────────────────────────────────
# App of Apps — ArgoCD gerencia os 5 microsserviços do ToggleMaster
# Aplicar com: kubectl apply -f gitops/apps/togglemaster-apps.yaml -n argocd
# ─────────────────────────────────────────────────────────────────────────────

# ── auth ──────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: togglemaster-auth
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/1DCLT-TECH-CHALLENGE/toggle-master-multiserv-fase3
    targetRevision: main
    path: gitops/base/auth
  destination:
    server: https://kubernetes.default.svc
    namespace: togglemaster
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
